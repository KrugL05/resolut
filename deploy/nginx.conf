# RESOLUTE — конфиг Nginx для VPS
# Скопировать в /etc/nginx/sites-available/resolute, затем:
#   ln -s /etc/nginx/sites-available/resolute /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# Пока деплой по IP (без домена). Когда появится домен — заменить
# `server_name _;` на доменное имя и выпустить SSL через certbot.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /var/www/resolute/public;
    index index.html;

    # gzip для статики
    gzip on;
    gzip_types text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    # Кэш статических ассетов
    location ~* \.(css|js|jpg|jpeg|png|webp|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # API → Node-процесс (PM2) на 127.0.0.1:3000
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA-fallback (аналог rewrites из vercel.json)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
