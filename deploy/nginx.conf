# RESOLUTE — конфиг Nginx для VPS
# Скопировать в /etc/nginx/sites-available/resolute, затем:
#   ln -s /etc/nginx/sites-available/resolute /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# Пока деплой по IP (без домена). Когда появится домен — заменить
# `server_name _;` на доменное имя и выпустить SSL через certbot.
#
# Маршрутизация:
#   /api/submit-form  → Express (форма заявки, PM2 :3000)
#   /api/             → PocketBase (галерея/статьи: данные и файлы, :8090)
#   /_/               → PocketBase (админка для заказчика)
#   всё остальное     → статика из public/

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /var/www/resolute/public;
    index index.html;

    # Разрешаем загрузку фото через админку PocketBase (до 12 МБ)
    client_max_body_size 12M;

    # gzip для статики
    gzip on;
    gzip_types text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    # Кэш статических ассетов
    location ~* \.(css|js|jpg|jpeg|png|webp|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Форма заявки → Node-процесс Express (PM2) на :3000
    # Точный матч имеет приоритет над префиксом /api/ ниже.
    location = /api/submit-form {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Остальной /api/ (коллекции, файлы, realtime) → PocketBase :8090
    # ^~ обязателен: иначе regex-локация кэша статики перехватит /api/files/*.jpg
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Админка PocketBase (заказчик управляет галереей/статьями)
    # ^~ обязателен: иначе regex-локация кэша статики перехватит ассеты админки /_/*.js
    location ^~ /_/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA-fallback (аналог rewrites из vercel.json)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
